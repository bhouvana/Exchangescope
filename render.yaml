# render.yaml — ExchangeScope deployment blueprint
# Docs: https://render.com/docs/blueprint-spec
#
# Architecture: one Node.js web service that:
#   - builds the Vite frontend at deploy time
#   - serves the built frontend as static files (same origin as the API)
#   - handles all /api/* routes via Express
#   - handles WebSocket on the same port
#
# This mirrors the local setup where the Vite dev-server proxies /api to
# Express; in production Express does the serving directly.

databases:
  - name: exchangescope-db
    databaseName: exchangescope
    user: exchangescope
    plan: free          # 90-day free tier on Render; upgrade for persistence

services:
  - type: web
    name: exchangescope
    runtime: node
    plan: free          # 512 MB RAM, shared CPU; upgrade for always-on
    rootDir: .

    # Build sequence (runs from repo root):
    #  1. Activate pnpm via corepack (built into Node 24, no root required)
    #  2. Install all workspace packages
    #  3. Push DB schema (creates/migrates tables; --force skips prompts)
    #  4. Compile C++ matching engine for Linux (g++ ships with Render's Ubuntu image)
    #  5. Build the React frontend with Vite
    #  6. Bundle the API server with esbuild
    buildCommand: >-
      corepack prepare pnpm@9 --activate &&
      pnpm install --no-frozen-lockfile &&
      pnpm --filter @workspace/db push-force &&
      mkdir -p artifacts/api-server/engine &&
      g++ -std=c++20 -O2 -o artifacts/api-server/engine/matching_engine artifacts/api-server/src/engine/matching_engine.cpp &&
      cd artifacts/exchange-scope && npx vite build &&
      cd ../api-server && node ./build.mjs

    # Render sets PORT=10000 automatically; the app reads process.env.PORT
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs

    healthCheckPath: /api/healthz

    envVars:
      # Runtime environment
      - key: NODE_ENV
        value: production

      # PostgreSQL — Render injects the internal connection string automatically
      - key: DATABASE_URL
        fromDatabase:
          name: exchangescope-db
          property: connectionString

      # Where Express finds the built frontend (relative to cwd = repo root)
      - key: FRONTEND_DIST
        value: artifacts/exchange-scope/dist/public

      # Secret API keys — set these manually in the Render dashboard after deploy
      - key: FINNHUB_API_KEY
        sync: false     # free at https://finnhub.io/

      - key: GROQ_API_KEY
        sync: false     # free at https://console.groq.com/

      # Session signing secret — auto-generated by Render on first deploy
      - key: SESSION_SECRET
        generateValue: true
