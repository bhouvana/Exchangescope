kind = "web"
previewPath = "/"
title = "ExchangeScope"
version = "1.0.0"
id = "artifacts/exchange-scope"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20691

[services.development]
run = "pnpm --filter @workspace/exchange-scope run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/exchange-scope", "run", "build" ]
publicDir = "artifacts/exchange-scope/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20691"
BASE_PATH = "/"
